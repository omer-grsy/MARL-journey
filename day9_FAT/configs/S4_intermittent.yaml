scenario: S4_intermittent
use_fault_indicator: true

fault:
  type: intermittent
  agents: ["agent_0"]   # 1/N intermittent (Day 8 ile uyumlu, detector majority-healthy korunur)
  prob: 0.3              # %30 dropout aktifken; intensity=1.0 + prob=0.3 → effective %30
                         # 0.5 fail_stop'a yakın, 0.1 none'a yakın — 0.3 dengeli orta nokta.

curriculum:
  linear_frac: 0.2
  linear_max: 0.2
  plateau_window: 40
  plateau_eps: 0.02
  bump_step: 0.1
  intensity_cap: 1.0

detector:
  k_threshold: 3.0
  k_cv: 2.0
  k_fleet: 0.7              # 1.5'ten düşürüldü (analitik tavan 1.0)
  k_cos_drop: 0.35          # YENİ — sign-flip yakalar
  k_coherence_drop: 0.3     # YENİ — random byzantine yakalar
  ema_alpha: 0.05
  hysteresis_M: 5
  set_persistence_K: 3
  warmup_updates: 30
topology_manager:
  keep_self_loop: true
