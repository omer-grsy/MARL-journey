program: PPO_Hyperparameter_Sweep.py
method: bayes
project: my-ppo-experiments
entity: dr-omer-gursoy-yildiz-technical-university
metric:
  name: charts/last_100_mean_return
  goal: maximize
parameters:
  learning_rate:
    values: [1e-5, 3e-5, 1e-4, 3e-4, 1e-3]
  ent_coef:
    values: [0.001, 0.005, 0.01, 0.05]
  clip_coef:
    values: [0.1, 0.2, 0.3]
  gamma:
    values: [0.95, 0.99, 0.999]
  gae_lambda:
    values: [0.9, 0.95, 0.99]
  num_minibatches:
    values: [2, 4, 8]
  update_epochs:
    values: [2, 4, 8]
